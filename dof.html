<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homework 3 - Depth of Field</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Homework 3 - Depth of Field</h1>

    <p>
      This page shows one example of shallow depth of field and one example of deep depth of field.
    </p>

    <div class="image-row">
      <figure>
        <img src="shallowDOF.jpg" alt="Shallow depth of field image">
        <figcaption>
          Shallow depth of field: the subject is sharp while the background is blurred.
        </figcaption>
      </figure>

      <figure>
        <img src="deepDOF.jpg" alt="Deep depth of field image">
        <figcaption>
          Deep depth of field: both the foreground and background remain in focus.
        </figcaption>
      </figure>
    </div>
  </div>
</body>
</html>
