      <h1>The Train</h1>
      <p>You step onto the train.</p>
      <p>You look around. You are the only passenger.</p>
      <p>For a moment, you feel relief.</p>
      <p>Then suddenly, the man enters your car and sits directly across from you.</p>
      <p>He stares at you.</p>
      <p>What do you do?</p>

      <div class="choices">
        <a class="button" href="nextstop.html">Get off at the next stop</a>

      </div>
